<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>My Gallery</h1>
        <div class="filter-buttons">
            <button class="btn active" data-filter="all">All</button>
            <button class="btn" data-filter="nature">Nature</button>
            <button class="btn" data-filter="architecture">Architecture</button>
        </div>
    </header>

    <main class="gallery-grid">
        <div class="gallery-item nature">
            <img src="https://picsum.photos/id/10/400/300" alt="Nature 1">
        </div>
        <div class="gallery-item architecture">
            <img src="https://picsum.photos/id/1011/400/300" alt="Arch 1">
        </div>
        <div class="gallery-item nature">
            <img src="https://picsum.photos/id/28/400/300" alt="Nature 2">
        </div>
        <div class="gallery-item architecture">
            <img src="https://picsum.photos/id/1031/400/300" alt="Arch 2">
        </div>
    </main>

    <div class="lightbox" id="lightbox">
        <span class="close-btn">&times;</span>
        <img class="lightbox-content" id="lightbox-img" src="" alt="">
    </div>

    <script src="script.js"></script>
</body>
</html>
